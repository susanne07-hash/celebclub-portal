name: Daily Follower Snapshot

on:
  schedule:
    # Every day at 12:00 UTC (= 14:00 Uhr deutsche Sommerzeit)
    - cron: '0 12 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Fetch follower snapshots → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/fetch_snapshots.py
