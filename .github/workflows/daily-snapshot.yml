name: Daily Follower Snapshot

on:
  schedule:
    # Every day at 23:00 UTC
    - cron: '0 23 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-snapshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit snapshots.json back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet \
            instaloader \
            requests

      - name: Fetch follower snapshots
        run: python scripts/fetch_snapshots.py

      - name: Commit updated snapshots
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"
          git add data/snapshots.json
          # Only commit if the file actually changed
          git diff --staged --quiet \
            || git commit -m "chore: daily snapshot $(date -u +'%Y-%m-%d')"
          git push
