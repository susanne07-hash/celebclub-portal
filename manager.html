<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelebClub · Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="dashboard-container">

    <!-- HEADER -->
    <header class="top-header">
        <div class="header-left">
            <img src="assets/logo/celebclub-logo.png" alt="CelebClub" class="header-logo">
        </div>
        <div class="header-center">
            <span class="welcome-line">Manager View · <strong id="headerName">–</strong></span>
            <span class="header-date" id="headerDate"></span>
        </div>
        <div class="header-right">
            <span class="status-badge" style="color:#f2c94c;border-color:rgba(242,201,76,0.3);background:rgba(242,201,76,0.08)">Manager</span>
            <div class="avatar" id="headerAvatar" style="border-color:rgba(242,201,76,0.5);box-shadow:0 0 14px rgba(242,201,76,0.3)">–</div>
            <button class="icon-btn" title="Abmelden" onclick="Auth.logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </header>

    <div class="main-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <ul>
                <li class="nav-item active" data-section="overview">
                    <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span class="nav-title">Overview</span>
                </li>
                <li class="nav-item" data-section="tasks">
                    <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    <span class="nav-title">Tasks</span>
                    <span class="nav-badge" id="mgr-taskBadge" style="display:none">0</span>
                </li>
                <li class="nav-item" data-section="models">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span class="nav-title">Models</span>
                </li>
                <li class="nav-item" data-section="resources">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span class="nav-title">Resources</span>
                </li>
                <li class="nav-item nav-item--bottom" data-section="settings">
                    <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span class="nav-title">Settings</span>
                </li>
            </ul>
        </aside>

        <main class="main-content">

            <!-- ═══════════ OVERVIEW ═══════════ -->
            <section class="section active" id="overview">
                <div class="section-header">
                    <h2 class="section-heading">Model Overview</h2>
                    <button class="btn-primary" id="addModelBtn">+ Model hinzufügen</button>
                </div>

                <!-- Summary strip -->
                <div class="mgr-summary-strip" id="summaryStrip"><!-- filled by manager-view.js --></div>

                <!-- Model cards -->
                <div class="model-cards-grid" id="modelCardsGrid"><!-- filled by manager-view.js --></div>
            </section>

            <!-- ═══════════ TASKS ═══════════ -->
            <section class="section" id="tasks">
                <div class="section-header">
                    <h2 class="section-heading">Tasks</h2>
                    <div style="display:flex;gap:10px;align-items:center">
                        <select class="filter-select" id="taskFilterModel">
                            <option value="all">Alle Models</option>
                        </select>
                        <select class="filter-select" id="taskFilterStatus">
                            <option value="all">Alle Status</option>
                            <option value="open">Offen</option>
                            <option value="in_progress">In Bearbeitung</option>
                            <option value="done">Erledigt</option>
                        </select>
                        <select class="filter-select" id="taskFilterPriority">
                            <option value="all">Alle Prioritäten</option>
                            <option value="urgent">Dringend</option>
                            <option value="high">Hoch</option>
                            <option value="medium">Mittel</option>
                            <option value="low">Niedrig</option>
                        </select>
                        <button class="btn-primary" id="addTaskBtn">+ Task</button>
                    </div>
                </div>
                <div class="mgr-task-list" id="mgrTaskList"><!-- filled by manager-view.js --></div>
            </section>

            <!-- ═══════════ MODELS ═══════════ -->
            <section class="section" id="models">
                <div class="section-header">
                    <h2 class="section-heading">Model Management</h2>
                    <button class="btn-primary" id="addModelBtn2">+ Model hinzufügen</button>
                </div>
                <div class="mgr-model-list" id="mgrModelList"><!-- filled by manager-view.js --></div>
            </section>

            <!-- ═══════════ RESOURCES ═══════════ -->
            <section class="section" id="resources">
                <div class="section-header">
                    <h2 class="section-heading">Resource Library</h2>
                    <button class="btn-primary" id="addResourceBtn">+ Resource hinzufügen</button>
                </div>
                <div class="resource-tabs" id="mgr-resourceTabs"><!-- filled --></div>
                <div class="mgr-resource-list" id="mgrResourceList"><!-- filled by manager-view.js --></div>
            </section>

            <!-- ═══════════ SETTINGS ═══════════ -->
            <section class="section" id="settings">
                <div class="section-header"><h2 class="section-heading">Settings</h2></div>
                <div class="card" style="max-width:480px">
                    <div class="panel-head"><h3 class="panel-title">Platform</h3></div>
                    <div class="settings-form">
                        <div class="settings-row"><label class="settings-label">Platform Name</label><input class="settings-input" value="CelebClub"></div>
                        <div class="settings-row"><label class="settings-label">Support E-Mail</label><input class="settings-input" type="email" value="support@celebclub.com"></div>
                        <button class="btn-primary" style="margin-top:8px">Speichern</button>
                    </div>
                </div>
            </section>

        </main>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- MODAL                                                    -->
<!-- ═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">–</h3>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body" id="modalBody"><!-- filled dynamically --></div>
        <div class="modal-footer">
            <button class="btn-danger" id="modalDelete" style="display:none;margin-right:auto">Model löschen</button>
            <button class="btn-ghost" id="modalCancel">Abbrechen</button>
            <button class="btn-primary" id="modalSave">Speichern</button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- ANALYTICS OVERLAY                                        -->
<!-- ═══════════════════════════════════════════════════════ -->
<div class="analytics-overlay" id="analyticsOverlay">
    <div class="analytics-panel">

        <!-- Header -->
        <div class="analytics-header">
            <div>
                <div class="analytics-title">Analytics · <span id="analyticsModelName">–</span></div>
                <div class="analytics-period-label" id="analyticsPeriodLabel">Gesamter Zeitraum</div>
            </div>
            <button class="modal-close" id="analyticsClose">✕</button>
        </div>

        <!-- Filter bar -->
        <div class="analytics-filters">
            <div class="analytics-filter-group">
                <button class="afilter-btn active" data-platform="all">Alle</button>
                <button class="afilter-btn" data-platform="instagram">Instagram</button>
                <button class="afilter-btn" data-platform="tiktok">TikTok</button>
                <button class="afilter-btn" data-platform="onlyfans">OnlyFans</button>
            </div>
            <div class="dp-wrap">
                <button class="afilter-btn dp-toggle-btn" id="dpToggleBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span id="dpToggleText">Gesamter Zeitraum</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </button>

                <!-- Date picker panel -->
                <div class="dp-panel" id="dpPanel">
                    <div class="dp-presets">
                        <button class="dp-preset-btn active" data-preset="all">All Time</button>
                        <button class="dp-preset-btn" data-preset="yesterday">Yesterday</button>
                        <button class="dp-preset-btn" data-preset="thisweek">This Week</button>
                        <button class="dp-preset-btn" data-preset="lastweek">Last Week</button>
                        <button class="dp-preset-btn" data-preset="thismonth">This Month</button>
                        <button class="dp-preset-btn" data-preset="lastmonth">Last Month</button>
                        <button class="dp-preset-btn" data-preset="thisyear">This Year</button>
                        <button class="dp-preset-btn" data-preset="lastyear">Last Year</button>
                    </div>
                    <div class="dp-cal-wrap">
                        <div class="dp-cal-header">
                            <button class="dp-nav-btn" id="dpPrev">&#8249;</button>
                            <span class="dp-cal-month" id="dpCalMonth">–</span>
                            <button class="dp-nav-btn" id="dpNext">&#8250;</button>
                        </div>
                        <div class="dp-dow-row">
                            <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                        </div>
                        <div class="dp-days-grid" id="dpDaysGrid"></div>
                        <div class="dp-apply-row">
                            <button class="btn-primary" id="dpApply">Anwenden</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI summary -->
        <div class="analytics-summary" id="analyticsSummary"></div>

        <!-- Posts table -->
        <div class="analytics-table-wrap">
            <table class="analytics-table">
                <thead>
                    <tr>
                        <th>Plattform</th>
                        <th>Datum</th>
                        <th>Titel</th>
                        <th>Views</th>
                        <th>Likes</th>
                        <th>Komm.</th>
                        <th>Shares</th>
                    </tr>
                </thead>
                <tbody id="analyticsTableBody"></tbody>
            </table>
        </div>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/snapshots.js"></script>
<script src="js/main.js"></script>
<script src="js/manager-view.js"></script>
</body>
</html>
